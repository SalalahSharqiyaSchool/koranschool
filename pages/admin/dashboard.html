<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم - الإداري</title>
  <style>
    body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); min-height: 100vh; margin: 0; padding: 1rem; }
    .container { max-width: 1200px; margin: 0 auto; background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: linear-gradient(45deg, #667eea, #764ba2); color: white; padding: 2rem; border-radius: 10px; text-align: center; }
    .stat-card h2 { margin: 0 0 1rem 0; }
    .nav-links { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; }
    .nav-btn { padding: 1rem 2rem; background: #4CAF50; color: white; text-decoration: none; border-radius: 5px; transition: background 0.3s; }
    .nav-btn:hover { background: #45a049; }
    h1 { text-align: center; color: #333; margin-bottom: 2rem; }
    .back { background: #f44336; color: white; border: none; padding: 1rem; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>لوحة التحكم الإدارية</h1>
    <div class="stats">
      <div class="stat-card">
        <h2>عدد الشعب</h2>
        <p>22 شعبة</p>
      </div>
      <div class="stat-card">
        <h2>عدد الطلاب</h2>
        <p id="total-students">0 (جاري التحميل)</p>
      </div>
      <div class="stat-card">
        <h2>سجلات اليوم</h2>
        <p>0</p>
      </div>
    </div>
    <div class="nav-links">
      <a href="manage-sections.html" class="nav-btn">إدارة الشعب</a>
      <a href="manage-students.html" class="nav-btn">إدارة الطلاب</a>
      <a href="reports.html" class="nav-btn">التقارير والغياب</a>
    </div>
    <button class="back" onclick="window.history.back()">رجوع للدخول</button>
  </div>
</body>
</html>
