<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الحضور</title>
  <style>
    body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); min-height: 100vh; margin: 0; padding: 1rem; box-sizing: border-box; }
    .container { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); max-height: 80vh; overflow-y: auto; }
    .section-info { text-align: center; margin-bottom: 2rem; padding: 1rem; background: #e3f2fd; border-radius: 5px; }
    .student { display: flex; align-items: center; padding: 1rem; border-bottom: 1px solid #eee; font-size: 1.1rem; }
    .student input[type="checkbox"] { transform: scale(1.5); margin-left: 1rem; }
    .save-btn { background: #4CAF50; color: white; border: none; padding: 1rem 2rem; font-size: 1.2rem; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 1rem; }
    .back { background: #f44336; color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 5px; cursor: pointer; margin-top: 1rem; width: 100%; }
    h1 { text-align: center; color: #333; }
  </style>
</head>
<body>
  <div class="container">
    <h1>تسجيل الحضور</h1>
    <div id="section-info" class="section-info">جاري التحميل...</div>
    <div id="students-list"></div>
    <button id="save-btn" class="save-btn" onclick="saveAttendance()" disabled>حفظ الحضور على GitHub</button>
    <button class="back" onclick="window.history.back()">رجوع</button>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const group = params.get('group');
    const sec = params.get('sec');
    document.getElementById('section-info').innerHTML = `المجموعة ${group} - الشعبة ${sec}`;
    
    // Demo students - integrate API
    const demoStudents = [
      {id: 's001', name: 'احمد محمد'},
      {id: 's002', name: 'فاطمة أحمد'},
      {id: 's003', name: 'علي حسن'}
    ];
    
    const list = document.getElementById('students-list');
    demoStudents.forEach((student, index) => {
      const div = document.createElement('div');
      div.className = 'student';
      div.innerHTML = `
        <input type="checkbox" id="chk${index}" checked>
        <label for="chk${index}">${student.name}</label>
        <span style="margin-right: auto; font-weight: bold;">${student.id}</span>
      `;
      list.appendChild(div);
    });
    document.getElementById('save-btn').disabled = false;
    
    function saveAttendance() {
      const attendance = Array.from(document.querySelectorAll('input[type="checkbox"]')).map((chk, i) => ({
        id: demoStudents[i].id,
        name: demoStudents[i].name,
        present: chk.checked
      }));
      // POST to /api/attendance/save-log
      console.log('حفظ:', attendance); // Simulate for local, APIs work on Vercel
      alert('تم حفظ سجل الحضور! (تحقق من console/GitHub logs)');
    }
  </script>
</body>
</html>
